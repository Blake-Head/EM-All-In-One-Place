project:
  type: book

book:
  title: "E&M: All In One Place"
  subtitle: "An Integrated Approach to Classical Electrodynamics"
  author: "Blake Head"
  date: today
  repo-url: https://github.com/Blake-Head/EM-All-In-One-Place
  repo-actions: [edit, issue]
  search: true

  sidebar:
    style: docked
    search: true
    collapse-level: 1

  chapters:
    - index.qmd
    - part: "0 — Vector Calculus"
      chapters:
        - phase-0-vector-calculus/01-gradient-divergence-curl.qmd
        - phase-0-vector-calculus/02-integral-theorems.qmd
        - phase-0-vector-calculus/03-curvilinear-coordinates.qmd
        - phase-0-vector-calculus/04-dirac-delta.qmd
    - part: "1 — Electrostatics"
      chapters:
        - phase-1-electrostatics/01-coulomb-gauss.qmd
        - phase-1-electrostatics/02-electric-potential.qmd
        - phase-1-electrostatics/03-separation-of-variables.qmd
        - phase-1-electrostatics/04-multipole-expansion.qmd
        - phase-1-electrostatics/05-greens-functions.qmd
        - phase-1-electrostatics/math-legendre-polynomials.qmd
        - phase-1-electrostatics/math-spherical-harmonics.qmd
    - part: "2 — Dielectrics"
      chapters:
        - phase-2-dielectrics/index.qmd
    - part: "3 — Magnetostatics"
      chapters:
        - phase-3-magnetostatics/index.qmd
    - part: "4 — Electrodynamics"
      chapters:
        - phase-4-electrodynamics/index.qmd
    - part: "5 — Electromagnetic Waves"
      chapters:
        - phase-5-waves/index.qmd
    - part: "6 — Radiation"
      chapters:
        - phase-6-radiation/index.qmd
    - part: "7 — Relativity & Electrodynamics"
      chapters:
        - phase-7-relativity/index.qmd
    - part: "8 — Advanced Topics"
      chapters:
        - phase-8-advanced/index.qmd
    - part: "Appendices"
      chapters:
        - appendices/notation-conventions.qmd
        - appendices/formula-reference.qmd
        - appendices/reading-map.qmd

bibliography: references.bib

format:
  html:
    theme:
# Darkmode Options: darkly (most popular), slate, solar, superhero, vapor
      dark: superhero
      light: cosmo
    css: assets/css/custom.scss
    grid:
      body-width: 1100px
      sidebar-width: 300px
      margin-width: 300px
    mainfont: "Source Serif 4"
    monofont: "Fira Code"
    code-copy: true
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    fig-align: center
    html-math-method:
      method: mathjax
      url: "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    include-in-header:
      - text: |
          <script>
            MathJax = {
              chtml: {
                scale: 1.35,
                minScale: 0.5
              }
            };
          </script>

execute:
  freeze: auto
